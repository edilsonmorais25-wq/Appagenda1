<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Agenda Ateli锚</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --rosa:         #f4a7c3;
      --rosa-escuro:  #d6679a;
      --rosa-claro:   #fde8f2;
      --rosa-medio:   #f9c8df;
      --creme:        #fdf0f7;
      --dourado:      #e8a45a;
      --chocolate:    #5a2340;
      --baunilha:     #fde8f2;
      --branco:       #ffffff;
      --cinza:        #a07090;
      --vermelho:     #e05252;
      --altura-topo:  82px;
      --altura-rodape:76px;
    }

    * { margin:0; padding:0; box-sizing:border-box; }
    body, html { height:100%; font-family:'Lato',sans-serif; background:var(--creme); color:var(--chocolate); overflow:hidden; }

    body::before {
      content:''; position:fixed; inset:0; z-index:0;
      background-image:
        radial-gradient(circle at 10% 20%, rgba(244,167,195,.22) 0%, transparent 55%),
        radial-gradient(circle at 90% 80%, rgba(214,103,154,.14) 0%, transparent 55%),
        radial-gradient(circle at 50% 50%, rgba(253,232,242,.5) 0%, transparent 70%);
      pointer-events:none;
    }

    /* 鈹�鈹� LAYOUT 鈹�鈹� */
    .app { display:flex; flex-direction:column; height:100%; position:relative; z-index:1; }

    /* 鈹�鈹� TOPO 鈹�鈹� */
    .topo {
      height:var(--altura-topo);
      background:linear-gradient(135deg, var(--chocolate) 0%, #8b3060 100%);
      display:flex; align-items:center; justify-content:center;
      flex-shrink:0; position:relative;
      box-shadow:0 4px 20px rgba(90,35,64,.35);
    }
    .topo-inner { display:flex; flex-direction:column; align-items:center; gap:2px; }
    .topo-icon { font-size:1.1rem; }
    .topo h1 {
      font-family:'Playfair Display',serif;
      font-size:1.75rem; font-weight:700;
      color:var(--branco); letter-spacing:.14em;
      text-transform:uppercase;
    }
    .topo h1 span { color:var(--rosa); font-style:italic; }
    .topo-linha {
      position:absolute; bottom:0; left:0; right:0; height:3px;
      background:linear-gradient(90deg, transparent, var(--dourado), var(--rosa), var(--rosa-escuro), var(--dourado), transparent);
    }

    /* 鈹�鈹� MEIO (home) 鈹�鈹� */
    .conteudo {
      flex:1; display:flex; flex-direction:column; justify-content:center; align-items:center;
      padding:0; overflow:hidden;
    }

    /* 脕rea de logo 鈥� ocupa TODO o espa莽o dispon铆vel */
    .logo-area {
      width:100%; height:100%;
      display:flex; align-items:center; justify-content:center;
      cursor:pointer; position:relative;
      overflow:hidden;
    }
    .logo-placeholder {
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      gap:16px;
      width:min(75vw, 75vh);
      height:min(75vw, 75vh);
      border:3px dashed rgba(214,103,154,.4); border-radius:50%;
      background:rgba(253,232,242,.55);
      transition:all .25s ease;
    }
    .logo-placeholder:hover { border-color:var(--rosa-escuro); background:rgba(253,232,242,.85); }
    .logo-placeholder i { font-size:4rem; color:rgba(214,103,154,.55); }
    .logo-placeholder span { font-size:.9rem; color:var(--cinza); font-weight:700; text-transform:uppercase; letter-spacing:.08em; text-align:center; line-height:1.6; }
    .logo-img {
      width:min(75vw, 75vh);
      height:min(75vw, 75vh);
      border-radius:50%;
      object-fit:cover;
      box-shadow:0 12px 48px rgba(90,35,64,.22);
      border:5px solid var(--rosa-medio);
      display:none;
    }
    .logo-img.visivel { display:block; }
    #logo-input { display:none; }

    /* 鈹�鈹� RODAP脡 NAV 鈹�鈹� */
    .rodape-nav {
      height:var(--altura-rodape);
      background:linear-gradient(135deg, var(--chocolate) 0%, #8b3060 100%);
      display:flex; align-items:stretch;
      border-top:3px solid var(--rosa);
      box-shadow:0 -4px 20px rgba(90,35,64,.28);
      flex-shrink:0;
    }
    .nav-btn {
      flex:1; background:none; border:none;
      color:rgba(255,255,255,.5);
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      gap:5px; cursor:pointer;
      font-family:'Lato',sans-serif; font-weight:700;
      font-size:.72rem; text-transform:uppercase; letter-spacing:.05em;
      transition:all .22s ease; position:relative; padding:8px 0;
    }
    .nav-btn .nav-icone-wrap {
      width:42px; height:42px; border-radius:14px;
      display:flex; align-items:center; justify-content:center;
      font-size:1.45rem;
      background:rgba(255,255,255,.08);
      transition:all .22s ease;
    }
    /* 脥cone Agenda - azul/turquesa */
    #btn-nav-agenda .nav-icone-wrap { color:#64b5f6; }
    #btn-nav-agenda:hover .nav-icone-wrap,
    #btn-nav-agenda.ativo .nav-icone-wrap {
      background:rgba(100,181,246,.22);
      box-shadow:0 4px 14px rgba(100,181,246,.45);
      color:#90caf9;
    }
    /* 脥cone Pedidos - rosa/salm茫o */
    #btn-nav-pedidos .nav-icone-wrap { color:#f48fb1; }
    #btn-nav-pedidos:hover .nav-icone-wrap,
    #btn-nav-pedidos.ativo .nav-icone-wrap {
      background:rgba(244,143,177,.22);
      box-shadow:0 4px 14px rgba(244,143,177,.45);
      color:#f8bbd9;
    }
    .nav-btn:hover, .nav-btn.ativo { color:var(--branco); }
    .nav-btn.ativo::after {
      content:''; position:absolute; top:0; left:20%; right:20%;
      height:3px; background:var(--rosa); border-radius:0 0 3px 3px;
    }
    .nav-divisor { width:1px; background:rgba(255,255,255,.12); margin:12px 0; }

    /* 鈹�鈹� MODAIS 鈹�鈹� */
    .modal {
      position:fixed; inset:0;
      background:rgba(90,35,64,.45); backdrop-filter:blur(5px);
      display:none; justify-content:flex-end; align-items:flex-end; z-index:100;
    }
    .modal.open { display:flex; }
    .modal.open .janela { animation:slideUp .32s cubic-bezier(.34,1.1,.64,1) both; }

    .janela {
      background:var(--branco); width:100%;
      height:calc(100% - var(--altura-topo));
      border-radius:24px 24px 0 0;
      display:flex; flex-direction:column; overflow:hidden;
    }
    .janela header {
      padding:16px 20px 14px;
      background:linear-gradient(135deg, var(--chocolate) 0%, #8b3060 100%);
      display:flex; justify-content:space-between; align-items:center; flex-shrink:0;
    }
    .titulo-header { display:flex; align-items:center; gap:10px; }
    .icone-header {
      width:36px; height:36px; background:rgba(255,255,255,.15); border-radius:10px;
      display:flex; align-items:center; justify-content:center; font-size:1.15rem;
    }
    .janela header h2 { font-family:'Playfair Display',serif; font-size:1.1rem; color:var(--branco); font-weight:500; }
    .fecha {
      background:rgba(255,255,255,.12); border:none; color:var(--branco);
      width:32px; height:32px; border-radius:50%; font-size:1rem;
      display:flex; align-items:center; justify-content:center; cursor:pointer; transition:background .2s;
    }
    .fecha:hover { background:rgba(255,255,255,.28); }

    .janela main { flex:1; overflow-y:auto; padding:18px; background:var(--creme); }
    .janela footer {
      height:64px; display:flex; justify-content:flex-end; align-items:center;
      padding:0 18px; gap:10px;
      background:var(--branco); border-top:1px solid rgba(244,167,195,.25); flex-shrink:0;
    }

    /* 鈹�鈹� BOT脮ES 鈹�鈹� */
    .btn-acao {
      background:linear-gradient(135deg,var(--rosa-escuro),var(--rosa));
      color:var(--branco); border:none; padding:11px 20px; border-radius:50px;
      font-size:.87rem; font-family:'Lato',sans-serif; font-weight:700; cursor:pointer;
      letter-spacing:.04em; text-transform:uppercase; transition:all .2s;
      box-shadow:0 4px 14px rgba(214,103,154,.4);
      display:flex; align-items:center; gap:7px;
    }
    .btn-acao:hover { transform:translateY(-1px); box-shadow:0 6px 20px rgba(214,103,154,.58); }
    .btn-acao.secundario { background:var(--baunilha); color:var(--chocolate); box-shadow:none; border:1.5px solid rgba(244,167,195,.4); }
    .btn-acao.danger { background:linear-gradient(135deg,#b03020,#e05252); box-shadow:0 4px 14px rgba(224,82,82,.38); }

    /* 脥cones coloridos nos bot玫es de a莽茫o */
    #btn-abrir-form i { color:#a8e6cf; }
    #btn-salvar-pedido i { color:#a8e6cf; }
    #btn-cancelar-form i { color:#e07878; }
    #btn-detalhe-editar i { color:#f9c74f; }
    .btn-acao.danger i { color:#ffd6d6; }
    .btn-acao.secundario#confirm-nao i { color:#e07878; }

    /* 鈹�鈹� CAMPOS 鈹�鈹� */
    .campo { margin-bottom:15px; }
    .campo label {
      display:flex; align-items:center; gap:6px; margin-bottom:7px;
      font-size:.77rem; font-weight:700; text-transform:uppercase; letter-spacing:.06em;
      color:var(--chocolate); opacity:.75;
    }
    .campo label i { color:var(--rosa-escuro); font-size:.85rem; }
    .campo input, .campo textarea, .campo select {
      width:100%; padding:12px 14px;
      border:1.5px solid rgba(244,167,195,.35); border-radius:12px;
      font-size:.95rem; font-family:'Lato',sans-serif;
      background:var(--branco); color:var(--chocolate);
      transition:border-color .2s,box-shadow .2s; outline:none;
      -webkit-appearance:none; appearance:none;
    }
    .campo input:focus, .campo textarea:focus, .campo select:focus {
      border-color:var(--rosa-escuro); box-shadow:0 0 0 3px rgba(214,103,154,.18);
    }

    /* Campo produto maior */
    #f-produto {
      min-height:80px;
      resize:vertical;
    }

    /* Campo hora 鈥� 100% confinado, sem bot茫o saindo do layout */
    .campo-hora-wrap {
      width:100%;
      overflow:hidden;
      border-radius:12px;
    }
    #f-hora {
      display:block;
      width:100%;
      max-width:100%;
      min-width:0;
      box-sizing:border-box;
      padding:12px 14px;
      font-size:1rem;
      font-family:'Lato',sans-serif;
      color:var(--chocolate);
      background:var(--branco);
      border:1.5px solid rgba(244,167,195,.35);
      border-radius:12px;
      overflow:hidden;
      -webkit-appearance:none;
      appearance:none;
      outline:none;
    }
    #f-hora:focus {
      border-color:var(--rosa-escuro);
      box-shadow:0 0 0 3px rgba(214,103,154,.18);
    }

    /* 鈹�鈹� CALEND脕RIO 鈹�鈹� */
    .calendario-grid { background:var(--branco); border-radius:16px; padding:16px; box-shadow:0 2px 8px rgba(90,35,64,.08); border:1px solid rgba(244,167,195,.2); }
    .cal-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
    .cal-header h3 { font-family:'Playfair Display',serif; color:var(--chocolate); font-size:.98rem; }
    .cal-nav { background:none; border:none; color:var(--rosa-escuro); font-size:1.2rem; cursor:pointer; padding:4px 10px; }
    .cal-dias-semana { display:grid; grid-template-columns:repeat(7,1fr); text-align:center; margin-bottom:5px; }
    .cal-dias-semana span { font-size:.68rem; font-weight:700; color:var(--cinza); text-transform:uppercase; padding:3px 0; }
    .cal-dias { display:grid; grid-template-columns:repeat(7,1fr); gap:3px; }
    .cal-dia {
      aspect-ratio:1; display:flex; align-items:center; justify-content:center;
      font-size:.83rem; border-radius:50%; cursor:pointer; color:var(--chocolate); transition:all .15s;
    }
    .cal-dia:hover { background:var(--rosa-claro); }
    .cal-dia.hoje { background:var(--rosa-escuro); color:var(--branco); font-weight:700; }
    .cal-dia.tem-pedido { position:relative; }
    .cal-dia.tem-pedido::after { content:''; position:absolute; bottom:2px; width:4px; height:4px; background:var(--dourado); border-radius:50%; }
    .cal-dia.vazio { pointer-events:none; }

    /* 鈹�鈹� LISTA PEDIDOS 鈹�鈹� */
    .lista-pedidos { display:flex; flex-direction:column; gap:11px; }
    .pedido-item {
      background:var(--branco); border-radius:16px; padding:14px 16px;
      box-shadow:0 2px 10px rgba(90,35,64,.09); border-left:4px solid var(--rosa);
      display:flex; align-items:center; justify-content:space-between; gap:12px;
      transition:transform .15s,box-shadow .15s;
    }
    .pedido-item:hover { transform:translateX(3px); box-shadow:0 4px 16px rgba(90,35,64,.16); }
    .pedido-info { flex:1; cursor:pointer; min-width:0; }
    .pedido-nome { font-family:'Playfair Display',serif; font-size:1rem; font-weight:700; color:var(--chocolate); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .pedido-data { font-size:.78rem; color:var(--cinza); margin-top:3px; display:flex; align-items:center; gap:4px; }
    .badge { display:inline-block; padding:2px 10px; border-radius:20px; font-size:.7rem; font-weight:700; margin-top:5px; }
    .badge.pendente { background:#fff3e0; color:#e65100; }
    .badge.producao  { background:#e3f2fd; color:#1565c0; }
    .badge.pronto    { background:#e8f5e9; color:#2e7d32; }
    .badge.entregue  { background:#f3e5f5; color:#6a1b9a; }
    .pedido-acoes { display:flex; flex-direction:column; gap:7px; flex-shrink:0; }
    .btn-icone {
      width:34px; height:34px; border-radius:10px; border:none; cursor:pointer;
      display:flex; align-items:center; justify-content:center; font-size:.9rem; transition:all .18s;
    }
    /* 脥cone editar 鈥� laranja/dourado */
    .btn-icone.editar  { background:rgba(232,164,90,.15); color:#e8a45a; }
    .btn-icone.editar:hover  { background:#e8a45a; color:var(--branco); }
    /* 脥cone excluir 鈥� vermelho */
    .btn-icone.excluir { background:rgba(224,82,82,.12); color:#e05252; }
    .btn-icone.excluir:hover { background:#e05252; color:var(--branco); }

    /* 鈹�鈹� DETALHE 鈹�鈹� */
    .detalhe-linha {
      display:flex; align-items:flex-start; gap:12px;
      padding:13px 0; border-bottom:1px solid rgba(244,167,195,.2);
    }
    .detalhe-linha:last-child { border-bottom:none; }
    .detalhe-icone {
      width:38px; height:38px; flex-shrink:0; background:var(--rosa-claro); border-radius:10px;
      display:flex; align-items:center; justify-content:center; font-size:1rem; color:var(--rosa-escuro);
    }
    .detalhe-label { font-size:.73rem; font-weight:700; text-transform:uppercase; letter-spacing:.06em; color:var(--cinza); margin-bottom:3px; }
    .detalhe-valor { font-size:.97rem; font-weight:700; color:var(--chocolate); }

    /* 鈹�鈹� SE脟脙O T脥TULO 鈹�鈹� */
    .secao-titulo {
      font-family:'Playfair Display',serif; font-size:.92rem; color:var(--chocolate);
      margin:18px 0 10px; display:flex; align-items:center; gap:7px;
    }

    /* 鈹�鈹� VAZIO 鈹�鈹� */
    .vazio-msg { text-align:center; padding:36px 20px; color:var(--cinza); }
    .vazio-msg .vi { font-size:2.8rem; margin-bottom:10px; }
    .vazio-msg p { font-size:.9rem; line-height:1.5; }

    /* 鈹�鈹� TOAST 鈹�鈹� */
    .toast {
      position:fixed; bottom:calc(var(--altura-rodape) + 12px); left:50%;
      transform:translateX(-50%) translateY(20px);
      background:var(--chocolate); color:var(--branco);
      padding:11px 20px; border-radius:50px; font-size:.87rem; font-weight:700;
      box-shadow:0 6px 24px rgba(90,35,64,.35); opacity:0; pointer-events:none;
      z-index:999; transition:all .3s ease; white-space:nowrap;
      display:flex; align-items:center; gap:7px;
    }
    .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

    /* 鈹�鈹� CONFIRM 鈹�鈹� */
    .confirm-overlay {
      position:fixed; inset:0; background:rgba(90,35,64,.55); backdrop-filter:blur(4px);
      display:none; align-items:center; justify-content:center; z-index:200; padding:24px;
    }
    .confirm-overlay.open { display:flex; }
    .confirm-box {
      background:var(--branco); border-radius:22px; padding:28px 22px;
      width:100%; max-width:320px; text-align:center;
      box-shadow:0 14px 48px rgba(90,35,64,.28); animation:fadeUp .28s ease;
    }
    .confirm-box .ci { font-size:2.4rem; margin-bottom:10px; }
    .confirm-box h3 { font-family:'Playfair Display',serif; font-size:1.1rem; color:var(--chocolate); margin-bottom:7px; }
    .confirm-box p { font-size:.86rem; color:var(--cinza); margin-bottom:20px; line-height:1.5; }
    .confirm-btns { display:flex; gap:10px; }
    .confirm-btns .btn-acao { flex:1; justify-content:center; }

    /* 鈹�鈹� ANIMA脟脮ES 鈹�鈹� */
    @keyframes fadeUp  { from{opacity:0;transform:translateY(18px)} to{opacity:1;transform:translateY(0)} }
    @keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
    @keyframes float   { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-7px)} }
    @keyframes pulse   { 0%,100%{transform:scale(1)} 50%{transform:scale(1.08)} }
    @keyframes ring    { 0%,100%{transform:rotate(0deg)} 15%{transform:rotate(-18deg)} 30%{transform:rotate(18deg)} 45%{transform:rotate(-12deg)} 60%{transform:rotate(12deg)} 75%{transform:rotate(-6deg)} 90%{transform:rotate(6deg)} }
    ::-webkit-scrollbar { width:4px; }
    ::-webkit-scrollbar-thumb { background:var(--rosa); border-radius:4px; }

    /* 鈹�鈹� ALARME OVERLAY 鈹�鈹� */
    .alarme-overlay {
      position:fixed; inset:0; z-index:500;
      background:rgba(90,35,64,.72); backdrop-filter:blur(8px);
      display:none; align-items:center; justify-content:center; padding:28px;
    }
    .alarme-overlay.open { display:flex; }
    .alarme-box {
      background:var(--branco); border-radius:28px; padding:36px 28px 28px;
      width:100%; max-width:340px; text-align:center;
      box-shadow:0 20px 60px rgba(90,35,64,.4);
      animation:fadeUp .35s ease both;
    }
    .alarme-icone-wrap {
      font-size:3.5rem; display:block; margin-bottom:14px;
    }
    .alarme-icone-wrap.tocando { animation:ring .7s ease-in-out infinite; }
    .alarme-tipo {
      font-size:.72rem; font-weight:700; text-transform:uppercase; letter-spacing:.1em;
      color:var(--rosa-escuro); margin-bottom:8px;
    }
    .alarme-box h2 {
      font-family:'Playfair Display',serif; font-size:1.25rem;
      color:var(--chocolate); margin-bottom:6px;
    }
    .alarme-box .alarme-cliente {
      font-size:1rem; color:var(--cinza); margin-bottom:4px;
    }
    .alarme-box .alarme-produto {
      font-size:.88rem; color:var(--chocolate); font-weight:700;
      background:var(--rosa-claro); border-radius:10px; padding:8px 14px;
      margin:12px 0 20px;
    }
    .alarme-box .alarme-hora {
      font-size:.82rem; color:var(--cinza); margin-bottom:20px;
    }
    .btn-desligar {
      width:100%; padding:14px; border-radius:50px; border:none;
      background:linear-gradient(135deg,var(--rosa-escuro),var(--rosa));
      color:var(--branco); font-size:1rem; font-family:'Lato',sans-serif;
      font-weight:700; cursor:pointer; letter-spacing:.05em;
      box-shadow:0 6px 20px rgba(214,103,154,.45);
      display:flex; align-items:center; justify-content:center; gap:9px;
      animation:pulse 1.4s ease-in-out infinite;
    }
    .btn-desligar:active { transform:scale(.97); }
  </style>
</head>
<body>
<div class="app">

  <!-- 鈺愨晲 TOPO FIXO 鈺愨晲 -->
  <header class="topo">
    <div class="topo-inner">
      <span class="topo-icon">馃巶</span>
      <h1>AGENDA <span>Ateli锚</span></h1>
    </div>
    <div class="topo-linha"></div>
  </header>

  <!-- 鈺愨晲 HOME 鈺愨晲 -->
  <div class="conteudo">
    <div class="logo-area" id="logo-area" title="Toque 3x para trocar a logo">
      <img class="logo-img" id="logo-img" src="" alt="Logo do ateli锚">
      <div class="logo-placeholder" id="logo-placeholder">
        <i class="fas fa-camera"></i>
        <span>Toque para adicionar<br>sua logo</span>
      </div>
    </div>
    <input type="file" id="logo-input" accept="image/*">
  </div>

  <!-- 鈺愨晲 RODAP脡 NAV 鈺愨晲 -->
  <nav class="rodape-nav">
    <button class="nav-btn" id="btn-nav-agenda">
      <div class="nav-icone-wrap">
        <i class="fas fa-calendar-alt"></i>
      </div>
      馃搮 Agenda
