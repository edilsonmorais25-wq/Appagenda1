<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>ATELIÊ SONHO DOCE - Gestão Premium</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, 'Inter', sans-serif;
    background: linear-gradient(135deg, #0f0c1f 0%, #1a1535 50%, #0f0c1f 100%);
    min-height: 100vh;
    padding-bottom: 30px;
    position: relative;
    overflow-x: hidden;
}

body::before {
    content: '';
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at 20% 50%, rgba(255,111,216,0.08) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(123,47,247,0.08) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
}

.container {
    max-width: 650px;
    margin: 0 auto;
    padding: 16px;
    position: relative;
    z-index: 1;
}

header {
    text-align: center;
    padding: 30px 20px;
    margin-bottom: 25px;
    background: linear-gradient(135deg, rgba(255,255,255,0.15), rgba(255,255,255,0.05));
    backdrop-filter: blur(12px);
    border-radius: 50px;
    box-shadow: 0 25px 45px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.2);
    border: 1px solid rgba(255,255,255,0.25);
    position: relative;
    overflow: hidden;
}

.logo-icon {
    font-size: 3rem;
    filter: drop-shadow(0 5px 15px rgba(0,0,0,0.3));
    animation: float 3s ease-in-out infinite;
    display: inline-block;
}

@keyframes float {
    0%, 100% { transform: translateY(0px) rotate(0deg); }
    50% { transform: translateY(-10px) rotate(5deg); }
}

header h1 {
    font-size: 2rem;
    font-weight: 800;
    background: linear-gradient(135deg, #fff8e7, #ffd6f0, #ff9a5c, #ff6fd8);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    text-shadow: 0 2px 10px rgba(0,0,0,0.2);
    letter-spacing: -0.5px;
    margin-top: 10px;
}

header .subtitle {
    font-size: 0.8rem;
    opacity: 0.9;
    margin-top: 8px;
    letter-spacing: 2px;
}

#clock {
    font-size: 0.85rem;
    margin-top: 12px;
    background: rgba(0,0,0,0.4);
    display: inline-block;
    padding: 6px 18px;
    border-radius: 40px;
    font-weight: 500;
    backdrop-filter: blur(5px);
    font-family: monospace;
}

.btn-3d {
    width: 100%;
    padding: 16px;
    margin: 10px 0;
    border: none;
    border-radius: 25px;
    font-size: 1rem;
    font-weight: bold;
    color: white;
    cursor: pointer;
    background: linear-gradient(145deg, #ff6fd8, #b340ff);
    box-shadow: 0 10px 20px rgba(0,0,0,0.3), 0 4px 0 rgba(0,0,0,0.2), inset 0 1px 0 rgba(255,255,255,0.3);
    transition: all 0.05s linear;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
}

.btn-3d:active {
    transform: translateY(4px);
    box-shadow: 0 6px 12px rgba(0,0,0,0.3), 0 2px 0 rgba(0,0,0,0.2);
}

.btn-3d .icon-3d {
    font-size: 1.4rem;
    filter: drop-shadow(2px 2px 2px rgba(0,0,0,0.3));
    transition: transform 0.2s;
}

.btn-3d:active .icon-3d {
    transform: scale(0.9);
}

.card-3d {
    background: rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(12px);
    padding: 20px;
    margin-top: 15px;
    border-radius: 28px;
    box-shadow: 0 15px 35px rgba(0,0,0,0.2), inset 0 1px 0 rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    transition: transform 0.3s, box-shadow 0.3s;
}

.card-3d:hover {
    transform: translateY(-5px);
    box-shadow: 0 25px 45px rgba(0,0,0,0.3);
}

.card-3d h3 {
    font-size: 1.5rem;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 10px;
    border-left: 4px solid #ff6fd8;
    padding-left: 15px;
}

.input-3d {
    width: 100%;
    padding: 14px;
    margin-top: 6px;
    margin-bottom: 16px;
    border: none;
    border-radius: 18px;
    background: rgba(255,255,255,0.95);
    font-size: 1rem;
    outline: none;
    transition: all 0.2s;
    box-shadow: inset 0 2px 5px rgba(0,0,0,0.1);
}

.input-3d:focus {
    background: white;
    box-shadow: inset 0 2px 5px rgba(0,0,0,0.1), 0 0 0 3px rgba(255,111,216,0.4);
    transform: scale(1.01);
}

.select-3d {
    width: 100%;
    padding: 14px;
    margin-top: 6px;
    margin-bottom: 16px;
    border: none;
    border-radius: 18px;
    background: rgba(255,255,255,0.95);
    font-size: 1rem;
    cursor: pointer;
}

/* NOVAS CORES DA LISTA DE PEDIDOS */
.pedido-item {
    background: linear-gradient(135deg, rgba(255,182,193,0.2), rgba(255,105,180,0.15));
    border-radius: 22px;
    padding: 16px;
    margin-bottom: 12px;
    transition: all 0.2s;
    border: 1px solid rgba(255,182,193,0.4);
    backdrop-filter: blur(5px);
}

.pedido-item:hover {
    transform: translateX(5px);
    background: linear-gradient(135deg, rgba(255,182,193,0.35), rgba(255,105,180,0.25));
    border: 1px solid rgba(255,182,193,0.6);
}

.pedido-cliente {
    font-size: 1.1rem;
    font-weight: bold;
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
    flex-wrap: wrap;
    color: #ffd6e8;
}

.cliente-icon {
    font-size: 1.6rem;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
}

.pedido-detalhes {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    margin: 10px 0;
}

.badge-produto {
    background: rgba(255,255,255,0.25);
    padding: 5px 12px;
    border-radius: 20px;
    font-size: 0.85rem;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    color: #fff0f5;
    backdrop-filter: blur(4px);
}

.badge-status {
    padding: 5px 12px;
    border-radius: 20px;
    font-size: 0.8rem;
    font-weight: bold;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.2);
}

.status-producao { 
    background: linear-gradient(135deg, #ff9800, #f57c00);
    color: white;
}
.status-pronto { 
    background: linear-gradient(135deg, #2196f3, #1976d2);
    color: white;
}
.status-entregue { 
    background: linear-gradient(135deg, #4caf50, #388e3c);
    color: white;
}

.btn-acao {
    padding: 8px 16px;
    margin-top: 10px;
    margin-right: 8px;
    border: none;
    border-radius: 40px;
    cursor: pointer;
    font-weight: bold;
    font-size: 0.8rem;
    transition: all 0.1s;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    box-shadow: 0 4px 8px rgba(0,0,0,0.2);
}

.btn-acao:active {
    transform: translateY(2px);
}

.btn-excluir { 
    background: linear-gradient(135deg, #dc3545, #c82333);
    color: white;
}
.btn-whats { 
    background: linear-gradient(135deg, #25D366, #128C7E);
    color: white;
}

.cliente-item {
    background: linear-gradient(135deg, rgba(255,255,255,0.12), rgba(255,255,255,0.05));
    padding: 14px 18px;
    margin-bottom: 10px;
    border-radius: 60px;
    display: flex;
    align-items: center;
    gap: 12px;
    transition: all 0.2s;
    border: 1px solid rgba(255,255,255,0.15);
}

.cliente-item:hover {
    transform: translateX(8px);
    background: rgba(255,255,255,0.2);
}

.cliente-avatar {
    font-size: 2rem;
}

.cliente-info {
    flex: 1;
}

.cliente-nome {
    font-weight: bold;
    font-size: 1rem;
    color: #ffd6e8;
}

.cliente-stats {
    font-size: 0.7rem;
    opacity: 0.8;
    margin-top: 3px;
    color: #ccc;
}

.stats-container {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    margin-bottom: 20px;
}

.stat-card-3d {
    background: rgba(0,0,0,0.35);
    backdrop-filter: blur(5px);
    padding: 12px;
    border-radius: 20px;
    text-align: center;
    border: 1px solid rgba(255,255,255,0.15);
}

.stat-value {
    font-size: 1.5rem;
    font-weight: bold;
    display: block;
    color: #ffb6c1;
}

.stat-label {
    font-size: 0.7rem;
    opacity: 0.9;
    color: #ddd;
}

.hidden {
    display: none;
}

.status-select {
    padding: 8px 12px;
    border-radius: 40px;
    border: none;
    margin-top: 10px;
    background: rgba(0,0,0,0.5);
    color: white;
    cursor: pointer;
    font-size: 0.75rem;
    backdrop-filter: blur(4px);
}

.status-select:hover {
    background: rgba(0,0,0,0.7);
}

::-webkit-scrollbar {
    width: 8px;
}
::-webkit-scrollbar-track {
    background: rgba(255,255,255,0.1);
    border-radius: 10px;
}
::-webkit-scrollbar-thumb {
    background: #ff6fd8;
    border-radius: 10px;
}
</style>
</head>

<body>

<div class="container">

<header>
    <span class="logo-icon">🍰✨🍰</span>
    <h1>ATELIÊ SONHO DOCE</h1>
    <div class="subtitle">✦ DOCES QUE ENCANTAM ✦</div>
    <div id="clock"></div>
</header>

<!-- MENU -->
<button class="btn-3d" onclick="showSection('pedido')">
    <span class="icon-3d">🧁</span> NOVO PEDIDO
    <span class="icon-3d">✨</span>
</button>
<button class="btn-3d" onclick="showSection('clientes')">
    <span class="icon-3d">👥</span> CLIENTES
    <span class="icon-3d">⭐</span>
</button>
<button class="btn-3d" onclick="showSection('agenda')">
    <span class="icon-3d">📅</span> AGENDA DE PEDIDOS
    <span class="icon-3d">🎂</span>
</button>

<!-- PEDIDO -->
<div id="pedido" class="card-3d hidden">
    <h3><span>🧁</span> NOVO PEDIDO</h3>
    
    <input id="cliente" class="input-3d" placeholder="👤 Nome do cliente">
    <input id="produto" class="input-3d" placeholder="🎂 Produto / Sabor">
    <input id="valor" class="input-3d" type="number" step="0.01" placeholder="💰 Valor (R$)">
    
    <select id="status" class="select-3d">
        <option value="Em produção">⚙️ Em produção</option>
        <option value="Pronto para entrega">📦 Pronto para entrega</option>
        <option value="Entregue">✅ Entregue</option>
    </select>
    
    <button class="btn-3d" onclick="salvarPedido()">
        <span class="icon-3d">💾</span> SALVAR PEDIDO
        <span class="icon-3d">🎯</span>
    </button>
</div>

<!-- CLIENTES -->
<div id="clientes" class="card-3d hidden">
    <h3><span>👑</span> NOSSOS CLIENTES</h3>
    <div id="listaClientes"></div>
</div>

<!-- AGENDA -->
<div id="agenda" class="card-3d hidden">
    <h3><span>📋</span> LISTA DE PEDIDOS</h3>
    <div class="stats-container" id="statsPanel"></div>
    <div id="listaPedidos"></div>
</div>

</div>

<script>

// ==================== DADOS ====================
let pedidos = JSON.parse(localStorage.getItem("pedidos_sonho_doce")) || [];

// Migrar dados antigos
const oldData = localStorage.getItem("pedidos");
if(oldData && pedidos.length === 0) {
    try {
        const oldPedidos = JSON.parse(oldData);
        if(oldPedidos && oldPedidos.length) {
            pedidos = oldPedidos.map((p, idx) => ({
                id: Date.now() + idx,
                cliente: p.cliente,
                produto: p.produto,
                valor: p.valor,
                status: p.status || "Em produção",
                dataCriacao: new Date().toLocaleString()
            }));
            persist();
        }
    } catch(e) {}
}

function persist() {
    localStorage.setItem("pedidos_sonho_doce", JSON.stringify(pedidos));
}

// ==================== NAVEGAÇÃO ====================
function showSection(sectionId) {
    document.querySelectorAll(".card-3d").forEach(section => {
        section.classList.add("hidden");
    });
    document.getElementById(sectionId).classList.remove("hidden");
    
    if(sectionId === "clientes") renderClientes();
    if(sectionId === "agenda") {
        renderPedidos();
        renderStats();
    }
}

// ==================== SALVAR PEDIDO ====================
function salvarPedido() {
    let cliente = document.getElementById("cliente").value.trim();
    let produto = document.getElementById("produto").value.trim();
    let valor = document.getElementById("valor").value.trim();
    let status = document.getElementById("status").value;
    
    if(!cliente || !produto || !valor) {
        alert("❌ Preencha todos os campos obrigatórios!");
        return;
    }
    
    const novoPedido = {
        id: Date.now(),
        cliente: cliente,
        produto: produto,
        valor: parseFloat(valor).toFixed(2),
        status: status,
        dataCriacao: new Date().toLocaleString()
    };
    
    pedidos.unshift(novoPedido);
    persist();
    
    // Limpar campos
    document.getElementById("cliente").value = "";
    document.getElementById("produto").value = "";
    document.getElementById("valor").value = "";
    
    alert("✅ Pedido salvo com sucesso!");
    
    // Atualizar visões
    renderPedidos();
    renderStats();
    renderClientes();
}

// ==================== RENDER PEDIDOS ====================
function renderPedidos() {
    const container = document.getElementById("listaPedidos");
    if(!container) return;
    
    if(pedidos.length === 0) {
        container.innerHTML = `<div style="text-align:center; padding:40px; color:#ffb6c1;">🎂 Nenhum pedido ainda! 🎂</div>`;
        return;
    }
    
    let html = "";
    pedidos.forEach(pedido => {
        let statusClass = "";
        if(pedido.status === "Entregue") statusClass = "status-entregue";
        else if(pedido.status === "Em produção") statusClass = "status-producao";
        else if(pedido.status === "Pronto para entrega") statusClass = "status-pronto";
        
        let statusIcon = pedido.status === "Entregue" ? "✅" : 
                        (pedido.status === "Pronto para entrega" ? "📦" : "⚙️");
        
        html += `
            <div class="pedido-item">
                <div class="pedido-cliente">
                    <span class="cliente-icon">👤</span>
                    <span><strong>${escapeHtml(pedido.cliente)}</strong></span>
                </div>
                <div class="pedido-detalhes">
                    <span class="badge-produto">🎂 ${escapeHtml(pedido.produto)}</span>
                    <span class="badge-produto">💰 R$ ${pedido.valor}</span>
                </div>
                <div>
                    <span class="badge-status ${statusClass}">${statusIcon} ${pedido.status}</span>
                </div>
                <div>
                    <button class="btn-acao btn-whats" onclick="enviarWhatsPedido(${pedido.id})">
                        📱 WhatsApp
                    </button>
                    <button class="btn-acao btn-excluir" onclick="excluirPedido(${pedido.id})">
                        🗑️ Excluir
                    </button>
                    <select class="status-select" onchange="alterarStatus(${pedido.id}, this.value)">
                        <option value="Em produção" ${pedido.status === "Em produção" ? "selected" : ""}>⚙️ Produção</option>
                        <option value="Pronto para entrega" ${pedido.status === "Pronto para entrega" ? "selected" : ""}>📦 Pronto</option>
                        <option value="Entregue" ${pedido.status === "Entregue" ? "selected" : ""}>✅ Entregue</option>
                    </select>
                </div>
                <div style="font-size:0.65rem; margin-top:10px; opacity:0.7; color:#ffb6c1;">📅 ${pedido.dataCriacao}</div>
            </div>
        `;
    });
    container.innerHTML = html;
}

// ==================== ESTATÍSTICAS ====================
function renderStats() {
    const statsDiv = document.getElementById("statsPanel");
    if(!statsDiv) return;
    
    const total = pedidos.length;
    const totalValor = pedidos.reduce((acc, p) => acc + parseFloat(p.valor), 0).toFixed(2);
    const ativos = pedidos.filter(p => p.status !== "Entregue").length;
    const entregues = pedidos.filter(p => p.status === "Entregue").length;
    
    statsDiv.innerHTML = `
        <div class="stat-card-3d">
            <span class="stat-value">📊 ${total}</span>
            <span class="stat-label">Total Pedidos</span>
        </div>
        <div class="stat-card-3d">
            <span class="stat-value">💰 R$ ${totalValor}</span>
            <span class="stat-label">Faturamento</span>
        </div>
        <div class="stat-card-3d">
            <span class="stat-value">⚡ ${ativos}</span>
            <span class="stat-label">Em Andamento</span>
        </div>
        <div class="stat-card-3d">
            <span class="stat-value">✅ ${entregues}</span>
            <span class="stat-label">Entregues</span>
        </div>
    `;
}

// ==================== RENDER CLIENTES ====================
function renderClientes() {
    const container = document.getElementById("listaClientes");
    if(!container) return;
    
    if(pedidos.length === 0) {
        container.innerHTML = `<div style="text-align:center; padding:40px; color:#ffb6c1;">👋 Nenhum cliente ainda</div>`;
        return;
    }
    
    const clientesMap = new Map();
    pedidos.forEach(p => {
        const key = p.cliente;
        if(clientesMap.has(key)) {
            let data = clientesMap.get(key);
            data.quantidade++;
            data.total += parseFloat(p.valor);
        } else {
            clientesMap.set(key, { 
                quantidade: 1, 
                total: parseFloat(p.valor)
            });
        }
    });
    
    let html = "";
    for(let [nome, info] of clientesMap) {
        html += `
            <div class="cliente-item">
                <span class="cliente-avatar">👤</span>
                <div class="cliente-info">
                    <div class="cliente-nome">${escapeHtml(nome)}</div>
                    <div class="cliente-stats">📦 ${info.quantidade} pedido(s) • 💰 R$ ${info.total.toFixed(2)}</div>
                </div>
                <button class="btn-acao btn-whats" style="padding:6px 12px; font-size:0.7rem;" onclick="enviarWhatsCliente('${escapeHtml(nome)}')">
                    💬 WhatsApp
                </button>
            </div>
        `;
    }
    container.innerHTML = html;
}

// ==================== FUNÇÕES DOS BOTÕES ====================

function excluirPedido(id) {
    if(confirm("🗑️ Tem certeza que deseja excluir este pedido?")) {
        pedidos = pedidos.filter(p => p.id != id);
        persist();
        renderPedidos();
        renderStats();
        renderClientes();
        alert("✅ Pedido excluído com sucesso!");
    }
}

function alterarStatus(id, novoStatus) {
    const pedido = pedidos.find(p => p.id == id);
    if(pedido) {
        pedido.status = novoStatus;
        persist();
        renderPedidos();
        renderStats();
        renderClientes();
    }
}

function enviarWhatsPedido(id) {
    const pedido = pedidos.find(p => p.id == id);
    if(!pedido) return;
    
    let msg = `🍰 *ATELIÊ SONHO DOCE* 🍰%0A%0A✨ *PEDIDO CONFIRMADO* ✨%0A%0A👤 Cliente: ${encodeURIComponent(pedido.cliente)}%0A🎂 Produto: ${encodeURIComponent(pedido.produto)}%0A💰 Valor: R$ ${pedido.valor}%0A📌 Status: ${pedido.status}%0A%0A🎯 *Obrigado pela preferência!* 🎯`;
    
    window.open(`https://wa.me/?text=${msg}`, '_blank');
}

function enviarWhatsCliente(nome) {
    const msg = `🍰 *ATELIÊ SONHO DOCE* 🍰%0A%0AOlá ${encodeURIComponent(nome)}!%0A%0ASeu pedido está sendo preparado com muito carinho! 🎂✨%0A%0AEm breve entraremos em contato com mais informações.%0A%0A*Obrigado por escolher a gente!* 💕`;
    window.open(`https://wa.me/?text=${msg}`, '_blank');
}

function escapeHtml(str) {
    if(!str) return '';
    return str.replace(/[&<>]/g, function(m) {
        if(m === '&') return '&amp;';
        if(m === '<') return '&lt;';
        if(m === '>') return '&gt;';
        return m;
    });
}

// ==================== RELÓGIO ====================
function updateClock() {
    const now = new Date();
    const dias = ['Domingo', 'Segunda', 'Terça', 'Quarta', 'Quinta', 'Sexta', 'Sábado'];
    document.getElementById("clock").innerHTML = `${dias[now.getDay()]}, ${now.toLocaleTimeString('pt-BR')}`;
}
setInterval(updateClock, 1000);
updateClock();

// ==================== INICIALIZAR ====================
showSection('pedido');

</script>

</body>
</html>
